# Suppress GitHub secret scanning on adversarial test fixtures.
#
# These files contain deliberately PII-shaped strings — fake API keys,
# fake credit card numbers, fake addresses, etc. — used to exercise
# the JD Codec Privacy Shield's redaction patterns. None of the values
# are real credentials. They exist so the regression suite can verify
# that, given input that LOOKS like a Stripe key / AWS secret / GitHub
# token / etc., the shield correctly emits the matching {{REDACTED_…}}
# token before any bytes leave the user's machine.
#
# Without this allowlist, GitHub's secret scanning + push protection
# would block every push touching the corpus, since the scanner has no
# way to distinguish "real leaked secret" from "PII-pattern test
# fixture." Files outside this list are scanned normally — actual
# secrets would still be caught.
#
# See https://docs.github.com/en/code-security/secret-scanning/configuring-secret-scanning-and-push-protection/excluding-folders-and-files-from-secret-scanning

paths-ignore:
  - 'src/resources/pii-test-corpus.json'
  - 'dist/resources/pii-test-corpus.json'
